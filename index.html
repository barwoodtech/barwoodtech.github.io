<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>barwood.tech</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --accent-prof: #38bdf8;
            --accent-personal: #34d399;
            --transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
        }

        .logo {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .logo span {
            color: var(--text-muted);
        }

        /* Toggle Button */
        .toggle-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid #1e293b;
            transition: var(--transition);
        }

        .toggle-btn:hover {
            color: var(--text-main);
            border-color: #334155;
        }

        /* Main Hero Section */
        main {
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
            padding: 60px 0;
            display: grid;
            grid-template-columns: 1fr;
            gap: 48px;
            align-items: center;
        }

        .hero-text {
            max-width: 600px;
        }

        .hero-text h1 {
            font-size: 2.25rem;
            font-weight: 400;
            line-height: 1.3;
            letter-spacing: -0.02em;
            margin-bottom: 24px;
        }

        .hero-text p {
            font-size: 1.05rem;
            color: var(--text-muted);
            font-weight: 300;
            line-height: 1.7;
        }

        .highlight {
            color: var(--accent-prof);
            font-weight: 500;
            transition: var(--transition);
        }

        /* Graphic Container */
        .graphic-container {
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0.8;
        }

        /* Minimal Vector Art representing the Lloyd's Building */
        .lloyds-graphic {
            width: 180px;
            height: 280px;
            fill: none;
            stroke: var(--accent-prof);
            stroke-width: 1.2;
            transition: var(--transition);
        }

        /* Mode Switch Animations */
        body.mode-personal .highlight {
            color: var(--accent-personal);
        }

        body.mode-personal .lloyds-graphic {
            stroke: var(--accent-personal);
            transform: scaleY(0.9) rotate(5deg);
        }

        .links {
            margin-top: 32px;
            display: flex;
            gap: 24px;
        }

        .links a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            opacity: 0.6;
            transition: var(--transition);
            border-bottom: 1px solid transparent;
        }

        .links a:hover {
            opacity: 1;
            border-bottom-color: var(--text-main);
        }

        footer {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #475569;
        }

        @media (min-width: 768px) {
            main {
                grid-template-columns: 1.5fr 1fr;
                gap: 80px;
            }
        }
    </style>
</head>
<body class="mode-prof">

    <header>
        <div class="logo">barwood<span>.tech</span></div>
        <button class="toggle-btn" id="modeToggle" onclick="toggleMode()">View Interests</button>
    </header>

    <main>
        <div class="hero-text">
            <div id="content-prof">
                <h1>Matthew Barwood</h1>
                <p>Business Analyst operating within the <span class="highlight">London Market</span>.
            </div>
            
            <div class="links">
                <a href="https://linkedin.com/in/barwood" target="_blank">LinkedIn</a>
                <a href="mailto:contact@barwood.tech">Email</a>
            </div>
        </div>

        <div class="graphic-container">
            <svg class="lloyds-graphic" viewBox="0 0 100 160" id="visual-art">
                <rect x="35" y="10" width="30" height="140" />
                <line x1="20" y1="30" x2="35" y2="30" />
                <line x1="20" y1="70" x2="35" y2="70" />
                <line x1="20" y1="110" x2="35" y2="110" />
                <rect x="12" y="40" width="12" height="20" />
                <rect x="12" y="80" width="12" height="20" />
                
                <line x1="65" y1="20" x2="85" y2="40" />
                <line x1="65" y1="50" x2="85" y2="70" />
                <line x1="65" y1="80" x2="85" y2="100" />
                <line x1="85" y1="10" x2="85" y2="150" />
            </svg>
        </div>
    </main>

    <footer>
        <div>&copy; 2026 barwood.tech</div>
    </footer>

</body>
</html>
