<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>barwood.tech</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --accent: #38bdf8;
            --steel: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            overflow: hidden;
        }

        /* Background Architecture Graphic (Lloyd's Building Concept) */
        .lloyds-graphic {
            position: absolute;
            bottom: 0;
            right: 10%;
            width: 300px;
            height: 70vh;
            display: flex;
            gap: 15px;
            align-items: flex-end;
            opacity: 0.15;
            z-index: 1;
            pointer-events: none;
        }

        .tower {
            background: linear-gradient(180deg, var(--steel) 0%, transparent 100%);
            width: 60px;
            position: relative;
            border-left: 1px solid rgba(255,255,255,0.2);
            border-right: 1px solid rgba(255,255,255,0.2);
        }

        .tower-1 { height: 100%; }
        .tower-2 { height: 85%; }
        .tower-3 { height: 60%; }

        /* External pipework detail mimicking Lloyd's high-tech architecture */
        .pipe {
            position: absolute;
            width: 4px;
            background-color: var(--accent);
            top: 0;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 15px var(--accent);
        }

        /* Content Area */
        main {
            max-width: 600px;
            margin-top: 15vh;
            z-index: 2;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 500;
            letter-spacing: -0.025em;
            margin-bottom: 48px;
            color: var(--text-muted);
        }

        .logo span {
            color: var(--text-main);
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 400;
            line-height: 1.3;
            letter-spacing: -0.03em;
            margin-bottom: 24px;
        }

        h1 span {
            color: var(--accent);
            font-weight: 500;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            font-weight: 300;
            max-width: 480px;
        }

        /* Minimal Navigation/Footer */
        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 32px;
            z-index: 2;
        }

        .links a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 400;
            transition: color 0.2s;
        }

        .links a:hover {
            color: var(--accent);
        }

        .domain-status {
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            body { padding: 24px; }
            h1 { font-size: 1.75rem; }
            .lloyds-graphic { right: 5%; width: 200px; }
            .tower-3 { display: none; }
        }
    </style>
</head>
<body>

    <div class="logo">
        barwood<span>.tech</span>
    </div>

    <main>
        <h1>
            Business Analyst in the <span>London Market</span> Insurance Space.
        </h1>
        <p class="subtitle">
            Driving technical delivery where tradition meets technology.
        </p>
    </main>

    <div class="lloyds-graphic">
        <div class="tower tower-3"></div>
        <div class="tower tower-1"><div class="pipe"></div></div>
        <div class="tower tower-2"></div>
    </div>

    <footer>
        <div class="links">
            <a href="https://linkedin.com/in/barwood" target="_blank">Connect on LinkedIn</a>
            <a href="mailto:website@barwood.tech" target="_blank">Email</a>
        </div>
        <div class="domain-status">
            &copy; barwood.tech
        </div>
    </footer>

</body>
</html>
