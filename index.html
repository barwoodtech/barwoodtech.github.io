<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>barwood.tech</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg width='64' height='64' viewBox='0 0 64 64' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='32' cy='32' r='32' fill='%230B0F19'/%3E%3Ccircle cx='32' cy='32' r='31' stroke='%23334155' stroke-width='2'/%3E%3Cpath d='M19.5 48V21.5C19.5 19.2909 21.2909 17.5 23.5 17.5H28C32.1421 17.5 35.5 20.8579 35.5 25C35.5 26.6568 34.9631 28.1818 34.0538 29.4184M19.5 34H33.0118M33.0118 34C32.3601 34.9317 31.9882 36.071 31.9882 37.2882C31.9882 40.4427 34.5456 43 37.7 43H39.5' stroke='%2338BDF8' stroke-width='3' stroke-linecap='round'/%3E%3Cpath d='M38 22V48' stroke='%2338BDF8' stroke-width='3' stroke-linecap='round'/%3E%3Cpath d='M41 18.5V48' stroke='%2338BDF8' stroke-width='3' stroke-linecap='round'/%3E%3Cpath d='M44 26.5V48' stroke='%2338BDF8' stroke-width='3' stroke-linecap='round'/%3E%3Cpath d='M38 26.5H44' stroke='%2338BDF8' stroke-width='3'/%3E%3Cpath d='M38 34.5H44' stroke='%2338BDF8' stroke-width='3'/%3E%3Cpath d='M38 42.5H44' stroke='%2338BDF8' stroke-width='3'/%3E%3Ccircle cx='41' cy='12' r='3.5' stroke='%2338BDF8' stroke-width='3'/%3E%3Cpath d='M41 15.5V18.5' stroke='%2338BDF8' stroke-width='3'/%3E%3C/svg%3E%0A"/>
    <style>
        :root {
            --bg-color: #0d121f;
            --text-main: #f1f5f9;
            --text-muted: #8e9db0;
            --accent: #38bdf8;
            --structure: #2a3a52; /* Steel Blue-Gray for the frame */
            --pipes: #c0c8d4;     /* Lighter steel for external services */
            --structure-opacity: 0.15;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            overflow: hidden; /* Keep the graphic contained */
            position: relative;
        }

        /* --- CONTENT AREA --- */
        .header-logo {
            font-size: 1.25rem;
            font-weight: 500;
            letter-spacing: -0.025em;
            margin-bottom: 48px;
            color: var(--text-muted);
            position: relative;
            z-index: 10;
        }

        .header-logo span {
            color: var(--text-main);
        }

        main {
            max-width: 650px;
            margin-top: 12vh;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 400;
            line-height: 1.3;
            letter-spacing: -0.03em;
            margin-bottom: 16px;
        }

        h1 span {
            color: var(--accent);
            font-weight: 500;
        }

        .subtitle {
            font-size: 1.25rem;
            color: var(--text-muted);
            font-weight: 300;
            letter-spacing: 0.01em;
        }

        /* --- LLOYDS BUILDING CSS GRAPHIC --- */
        .lloyds-container {
            position: absolute;
            bottom: -20px;
            right: 8%;
            width: 380px;
            height: 85vh;
            opacity: var(--structure-opacity);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        /* Main Structural Frame */
        .structure-main {
            width: 100%;
            height: 100%;
            display: flex;
            gap: 12px;
            position: relative;
            border-bottom: 4px solid var(--structure);
        }

        /* The iconic exterior service towers */
        .service-tower {
            background-color: transparent;
            width: 80px;
            position: relative;
            border-left: 2px solid var(--structure);
            border-right: 2px solid var(--structure);
        }

        /* Diagonal X-bracing texture */
        .service-tower::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(45deg, transparent 48%, var(--structure) 50%, transparent 52%),
                linear-gradient(-45deg, transparent 48%, var(--structure) 50%, transparent 52%);
            background-size: 30px 30px;
        }

        .tower-height-1 { height: 100%; }
        .tower-height-2 { height: 90%; }
        .tower-height-3 { height: 75%; }

        /* External 'Satellites' - Stairs/Lifts */
        .satellite {
            position: absolute;
            width: 25px;
            height: 80%;
            background-color: transparent;
            border: 2px solid var(--pipes);
            border-bottom: none;
            bottom: 12px;
        }

        .satellite-left { left: -15px; height: 92%; }
        .satellite-right { right: -15px; height: 85%; }

        /* External visible pipework / conduit */
        .conduit {
            position: absolute;
            width: 6px;
            height: 100%;
            background-color: var(--pipes);
            top: 0;
        }

        .conduit-1 { left: 10px; width: 4px; }
        .conduit-2 { left: 22px; width: 4px; }
        .conduit-3 { right: 15px; width: 8px; border-radius: 4px; background-color: var(--structure); }

        /* Central Atrium connection */
        .atrium-connector {
            flex-grow: 1;
            height: 60%;
            background-color: transparent;
            align-self: flex-end;
            position: relative;
            border-top: 2px solid var(--structure);
        }

        .atrium-connector::after {
            content: "";
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            background-image: 
                linear-gradient(45deg, transparent 48%, rgba(255,255,255,0.03) 50%, transparent 52%),
                linear-gradient(-45deg, transparent 48%, rgba(255,255,255,0.03) 50%, transparent 52%);
            background-size: 15px 15px;
        }

        /* --- FOOTER --- */
        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 32px;
            position: relative;
            z-index: 10;
        }

        .footer-left {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .links a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 400;
            transition: color 0.2s ease, border-bottom 0.2s ease;
            border-bottom: 1px solid transparent;
        }

        .links a:hover {
            color: var(--accent);
            border-bottom: 1px solid var(--accent);
        }

        .copyright {
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 0.02em;
        }

        /* --- RESPONSIVE ADJUSTMENTS --- */
        @media (max-width: 1024px) {
            .lloyds-container { right: 5%; width: 300px; }
        }

        @media (max-width: 768px) {
            body { padding: 24px; overflow: auto; }
            main { margin-top: 8vh; margin-bottom: 40px; }
            h1 { font-size: 1.85rem; }
            .subtitle { font-size: 1.15rem; }
            .lloyds-container { display: none; } /* Hide complex graphic on small screens for better readability */
            footer { flex-direction: column; align-items: flex-start; gap: 20px; }
            .footer-left { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="header-logo">
        barwood<span>.tech</span>
    </div>

    <main>
        <h1>
            Business Analyst in the <span>London Market</span> Insurance Space.
        </h1>
        <p class="subtitle">
            Influence without authority.
        </p>
    </main>

    <div class="lloyds-container">
        <div class="structure-main">
            
            <div class="service-tower tower-height-1">
                <div class="conduit conduit-1"></div>
                <div class="conduit conduit-2"></div>
                <div class="satellite satellite-left"></div>
            </div>

            <div class="atrium-connector"></div>

            <div class="service-tower tower-height-2">
                <div class="conduit conduit-3"></div>
                <div class="satellite satellite-right"></div>
            </div>

            <div class="service-tower tower-height-3" style="width: 50px;">
                <div class="conduit conduit-1" style="left: 15px;"></div>
            </div>

        </div>
    </div>

    <footer>
        <div class="footer-left links">
        </div>
        <div class="copyright">
            &copy; 2026 barwood.tech
        </div>
    </footer>

</body>
</html>
